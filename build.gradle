plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.5'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'nl.makan1869'
version = '0.0.1-SNAPSHOT'
description = 'capability-mesh'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
    // Spring AI milestones (needed for some pre-release artifacts)
    maven { url 'https://repo.spring.io/milestone' }
    maven { url 'https://repo.spring.io/snapshot' }
}

ext {
    set('springAiVersion', "2.0.0-M4")
}


dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Anthropic (Claude) chat via Spring AI
    implementation 'org.springframework.ai:spring-ai-starter-model-bedrock-converse'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    implementation 'org.springaicommunity:spring-ai-agent-utils:0.6.0'
}

tasks.named('test') {
    useJUnitPlatform()
}
